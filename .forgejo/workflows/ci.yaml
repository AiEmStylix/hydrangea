name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  # Bước CI: Chạy test và check build
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build and Test
        run: |
          zig build
          zig build test

  release:
    runs-on: ubuntu-latest
    needs: ci 
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build Release
        run: zig build -Doptimize=ReleaseFast
      - name: Package
        run: tar -czf app.tar.gz -C zig-out/ .
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app.tar.gz"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
